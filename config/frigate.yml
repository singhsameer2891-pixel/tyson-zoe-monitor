mqtt:
  host: mosquitto
  port: 1883

# Detection model — YOLOv8n runs on CPU for test phase
detectors:
  cpu:
    type: cpu

# go2rtc handles RTSP auth better than raw ffmpeg (avoids @ in password issues)
go2rtc:
  streams:
    camera_1:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=1&subtype=0
    camera_1_sub:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=1&subtype=1
    camera_2:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=2&subtype=0
    camera_2_sub:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=2&subtype=1
    camera_3:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=3&subtype=0
    camera_3_sub:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=3&subtype=1
    camera_entrance:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=4&subtype=0
    camera_entrance_sub:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=4&subtype=1
    camera_garden:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=5&subtype=0
    camera_garden_sub:
      - rtsp://frigate:Frigate1!@192.168.31.245:554/cam/realmonitor?channel=5&subtype=1

cameras:
  # ── Channel 1 ──
  camera_1:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera_1_sub
          roles: [detect]
        - path: rtsp://127.0.0.1:8554/camera_1
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person, dog]
    zones:
      boundary:
        coordinates: 0,0.581,0.688,0.027,1,0.061,1,1,0,1
        objects: person
        inertia: 1
        loitering_time: 0

  # ── Channel 2 ──
  camera_2:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera_2_sub
          roles: [detect]
        - path: rtsp://127.0.0.1:8554/camera_2
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person, dog]
    zones:
      boundary:
        coordinates: 0,0,0.32,0.214,1,0.588,1,1,0,1,0,0.169
        objects: person
        inertia: 1
        loitering_time: 0

  # ── Channel 3 ──
  camera_3:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera_3_sub
          roles: [detect]
        - path: rtsp://127.0.0.1:8554/camera_3
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person, dog]
    zones:
      boundary:
        coordinates: 0,0.892,0.751,0.087,0.779,0,1,0,1,1,0,1
        objects: person
        inertia: 1
        loitering_time: 0

  # ── GARDEN CAMERA (Channel 5) — Monitors Tyson & Zoe entering garden ──
  camera_garden:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera_garden_sub
          roles: [detect]
        - path: rtsp://127.0.0.1:8554/camera_garden
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person, dog]
    zones:
      # Zone coordinates are normalized (0.0–1.0) polygon points.
      # Use Frigate's debug view at http://localhost:5000 to draw zones
      # and copy the coordinates here. Using full frame as placeholder.
      garden_zone:
        coordinates: 
          0,0.305,0.137,0.199,0.129,0.078,0.22,0.04,0.305,0.053,0.439,0.114,1,0.459,1,1,0,1
        objects: person
        inertia: 1
        loitering_time: 0
  camera_entrance:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera_entrance_sub
          roles: [detect]
        - path: rtsp://127.0.0.1:8554/camera_entrance
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person, dog]
    zones:
      backyard_garden:
        coordinates: 0.909,0.533,0.716,0.729,0.528,0.918,0.578,1,1,1,1,0.63
        loitering_time: 0
        inertia: 3
        objects:
          - dog
          - person
      boundary:
        coordinates: 
          0.512,0.071,0.244,0.116,0.041,0.158,0.037,0.245,0.038,0.395,0.033,0.435,0,0.592,0.003,0.985,0.515,1,0.733,1,1,1,1,0,0.531,0
        inertia: 1
        loitering_time: 0
        objects: person
record:
  enabled: true
  alerts:
    retain:
      days: 14
  detections:
    retain:
      days: 14
  continuous:
    days: 7
  motion:
    days: 7
snapshots:
  enabled: true
  bounding_box: true
  retain:
    default: 14
version: 0.17-0
